              value: "gemma-3"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: rag-poisoning-service
  namespace: workshop
spec:
  selector:
    app: rag-poisoning-service
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
---
