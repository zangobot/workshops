# =============================================================================
# 1. Namespaces
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: workshop-hub-system
  labels:
    name: workshop-hub-system
    purpose: workshop-hub-control-plane
---
apiVersion: v1
kind: Namespace
metadata:
  name: workshop
  labels:
    name: workshop
    purpose: workshop-pods
    managed-by: workshop-hub
---
# =============================================================================
# 2. RBAC (ServiceAccount, ClusterRole, Bindings)
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workshop-hub-controller
  namespace: workshop-hub-system
  labels:
    app: workshop-hub
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: workshop-hub-controller
  labels:
    app: workshop-hub
rules:
  # Pod management in workshop namespaces only
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]

  # Pod status for health checks
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get"]

  # Service management in workshop namespaces
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]

  # Secret management in workshop namespaces
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]

  # Ability to check if namespaces exist
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workshop-hub-manage-workshops
  namespace: workshop
  labels:
    app: workshop-hub
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: workshop-hub-controller
subjects:
  - kind: ServiceAccount
    name: workshop-hub-controller
    namespace: workshop-hub-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workshop-hub-self
  namespace: workshop-hub-system
  labels:
    app: workshop-hub
rules:
  # Hub needs to read its own config
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workshop-hub-self-binding
  namespace: workshop-hub-system
  labels:
    app: workshop-hub
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: workshop-hub-self
subjects:
  - kind: ServiceAccount
    name: workshop-hub-controller
    namespace: workshop-hub-system
---
# =============================================================================
# 3. Cilium Network Policies
# =============================================================================
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-hub-to-workshops
  namespace: workshop
spec:
  description: "Allow workshop pods to receive traffic from the hub"
  endpointSelector:
    matchLabels:
      managed-by: workshop-hub
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: workshop-hub-system
            app: workshop-hub
      toPorts:
        - ports:
            - port: "8888" # Sidecar proxy port
              protocol: TCP
            - port: "9000" # Sidecar health port
              protocol: TCP

    - fromEntities:
        - host
      toPorts:
        - ports:
            - port: "9000" # Health check port
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-hub-egress-to-workshops
  namespace: workshop-hub-system
spec:
  description: "Allow workshop-hub to reach workshop pods for proxying and health checks"
  endpointSelector:
    matchLabels:
      app: workshop-hub
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: workshop
      toPorts:
        - ports:
            - port: "8888" # Sidecar proxy port
              protocol: TCP
            - port: "9000" # Sidecar health port
              protocol: TCP
    - toEntities:
        - kube-apiserver
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-workshops-egress
  namespace: workshop
spec:
  description: "Allow workshop pods to reach DNS, internet, and internal services"
  endpointSelector:
    matchLabels:
      managed-by: workshop-hub
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - world
    # This allows workshops to talk to services in the same namespace (like challenge-server)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: workshop
---
# =============================================================================
# 4. Resource Limits & Configuration
# =============================================================================
apiVersion: v1
kind: ResourceQuota
metadata:
  name: workshop-quota
  namespace: workshop
spec:
  hard:
    requests.cpu: "100"
    requests.memory: "140Gi"
    limits.cpu: "200"
    limits.memory: "160Gi"
    pods: "100"
    services: "100"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: hub-quota
  namespace: workshop-hub-system
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "4"
    limits.memory: "8Gi"
    pods: "10"
    services: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: workshop-limits
  namespace: workshop
spec:
  limits:
    - max:
        cpu: "50"
        memory: "200Gi"
      min:
        cpu: "10m"
        memory: "4Mi"
      default:
        cpu: "2"
        memory: "2Gi"
      defaultRequest:
        cpu: "2"
        memory: "2Gi"
      type: Container
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: workshop-hub-config
  namespace: workshop-hub-system
data:
  # Core configuration
  workshop-name: "test-workshop"
  workshop-namespace: "workshop"
  # CHANGED: Added yolo-l2, email-indirect, llm-embeddings, rag-poisoning, and prompt-extraction workshops
  config.yaml: |
    workshops:
      - name: "yolo-l2"
        image: "ghcr.io/nbhdai/yolo-l2-notebook:v0.1.0"
        description: "YOLO Adversarial Challenge"
        port: 5000
        env:
          BASE_URL: "/workshop/yolo-l2"
          VERIFICATION_SERVER_UNTARGETED: http://yolo-l2-verification:5000/verify
          VERIFICATION_SERVER_TARGETED: http://yolo-l2-target-verification:5000/verify
      - name: "email-indirect"
        image: "ghcr.io/nbhdai/email-indirect-user:v0.1.0"
        description: "Email Injection Challenge"
        port: 5000
        env:
          CHALLENGE_SERVER_HOST: "email-indirect-service"
          CHALLENGE_SERVER_PORT: 2525
          MY_LISTEN_PORT: 25
          WEB_PORT: 5000
      - name: "rag-poisoning"
        image: "ghcr.io/nbhdai/rag-poisoning-user:v0.1.0"
        description: "RAG Poisoning Challenge"
        port: 5000
        env:
          SERVICE_URL: "http://rag-poisoning-service:5000"
      - name: "prompt-extraction"
        image: "ghcr.io/nbhdai/prompt-extraction-user:v0.1.0"
        description: "Prompt Extraction Challenge"
        port: 5000
        env:
          SERVICE_URL: "http://prompt-extraction-service:5000"
      - name: "llm-embeddings"
        image: "ghcr.io/nbhdai/llm-embeddings:v0.1.0"
        description: "LLM Embeddings Explorer"
        port: 8080
        env:
          PORT: "8080"

    workshop_namespace: "workshop"
    workshop_ttl_seconds: 3600
    workshop_idle_seconds: 600
    sidecar_proxy_port: 8888
    sidecar_health_port: 9000
    workshop_pod_limit: 20
    workshop_cpu_request: "1.0"
    workshop_cpu_limit: "2.0"
    workshop_mem_request: "4Gi"
    workshop_mem_limit: "8Gi"
    sidecar_image: "ghcr.io/nbhdai/workshop-sidecar:v0.1.0"
    garbage_collection_seconds: 300
---
# =============================================================================
# 5. Hub Deployment & Service
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workshop-hub
  namespace: workshop-hub-system
  labels:
    app: workshop-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workshop-hub
  template:
    metadata:
      labels:
        app: workshop-hub
    spec:
      serviceAccountName: workshop-hub-controller
      containers:
        - name: workshop-hub
          image: ghcr.io/nbhdai/workshop-hub:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
            seccompProfile:
              type: "RuntimeDefault"
          env:
            - name: HOME
              value: "/tmp"
            - name: RUST_LOG
              value: "trace,tower_http=debug,tower=info,fred=debug,h2=off,hyper=off,sqlx=off,tarpc=off,rustls=off"
          volumeMounts:
            - name: config-volume
              mountPath: /etc/workshop/config.yaml
              subPath: config.yaml
      volumes:
        - name: config-volume
          configMap:
            name: workshop-hub-config
---
apiVersion: v1
kind: Service
metadata:
  name: workshop-hub
  namespace: workshop-hub-system
  labels:
    app: workshop-hub
spec:
  type: NodePort
  selector:
    app: workshop-hub
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30303
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workshop-hub
  namespace: workshop-hub-system
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: workshop-hub
                port:
                  number: 8080
---
# 1. Define the pool of IP addresses Cilium is allowed to use for LoadBalancers
apiVersion: "cilium.io/v2alpha1"
kind: CiliumLoadBalancerIPPool
metadata:
  name: "workshop-lb-pool"
spec:
  blocks:
    - cidr: "10.211.0.50/32" # Restricts the pool to just your requested IP
---
# 2. Tell Cilium to actually announce LoadBalancer IPs on the local network via ARP
apiVersion: "cilium.io/v2alpha1"
kind: CiliumL2AnnouncementPolicy
metadata:
  name: "workshop-l2-policy"
spec:
  externalIPs: true
  loadBalancerIPs: true
---
apiVersion: "cilium.io/v2alpha1"
kind: CiliumL2AnnouncementPolicy
metadata:
  name: "workshop-l2-policy"
spec:
  externalIPs: true
  loadBalancerIPs: true
  nodeSelector:
    matchExpressions:
      - key: kubernetes.io/os
        operator: Exists
# # =============================================================================
# # 6. Supporting Services (YOLO & Email Challenges)
# # =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yolo-l2-verification
  namespace: workshop
  labels:
    app: yolo-l2-verification
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yolo-l2-verification
  template:
    metadata:
      labels:
        app: yolo-l2-verification
    spec:
      containers:
        - name: verification
          image: ghcr.io/nbhdai/yolo-l2-verification:v0.1.0
          ports:
            - containerPort: 5000
          env:
            - name: L2_THRESHOLD
              value: "50.0"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: yolo-l2-verification
  namespace: workshop
spec:
  selector:
    app: yolo-l2-verification
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000

---
# Email Workshop Service (LLM Bot)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: email-indirect-service
  namespace: workshop
  labels:
    app: email-indirect-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: email-indirect-service
  template:
    metadata:
      labels:
        app: email-indirect-service
    spec:
      containers:
        - name: service
          image: ghcr.io/nbhdai/email-indirect-service:v0.1.0
          ports:
            - containerPort: 2525
          env:
            - name: LISTEN_PORT
              value: "2525"
            - name: VLLM_URL
              # Pointing to the AI Proxy in default namespace (assuming it exists based on policies)
              value: "http://vllm-gemma3:8000/v1/chat/completions"
            - name: VLLM_MODEL
              value: "gemma-3"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: email-indirect-service
  namespace: workshop
spec:
  selector:
    app: email-indirect-service
  ports:
    - protocol: TCP
      port: 2525
      targetPort: 2525
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-gemma3
  namespace: workshop
  labels:
    app: vllm-gemma3
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vllm-gemma3
  template:
    metadata:
      labels:
        app: vllm-gemma3
    spec:
      # CRITICAL: This tells Talos to use the Nvidia container runtime
      runtimeClassName: nvidia
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.18.0-cu130
          command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - "--model"
            - "/models/google/gemma-3-4b-it" # Check your exact folder name on the PVC
            - "--served-model-name"
            - "gemma-3"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            # Gemma 3 is multimodal; trust remote code is sometimes required for newest architectures
            - "--trust-remote-code"
            - "--gpu-memory-utilization"
            - "0.95"
            - "--max-model-len"
            - "8192"
          ports:
            - containerPort: 8000
          resources:
            requests:
              nvidia.com/gpu: "1"
              memory: "16Gi"
              cpu: "4"
            limits:
              nvidia.com/gpu: "1"
              memory: "24Gi"
              cpu: "8"
          volumeMounts:
            - name: model-storage
              mountPath: /models
              readOnly: true
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: model-store-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-gemma3
  namespace: workshop
spec:
  selector:
    app: vllm-gemma3
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: model-store-pv
spec:
  capacity:
    storage: 500Gi
  volumeMode: Filesystem
  accessModes:
    - ReadOnlyMany # Safe for vLLM scaling
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual-models
  mountOptions:
    - nfsvers=4.1
    - noatime # Improves read performance
    - nolock
    - tcp
  nfs:
    server: 10.211.0.10
    path: /mnt/data/model-store/
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-store-pvc
  namespace: workshop
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: manual-models
  resources:
    requests:
      storage: 500Gi
  volumeName: model-store-pv
---
# =============================================================================
