            - name: VLLM_URL
              value: "http://vllm-gemma3:8000/v1/chat/completions"
            - name: VLLM_MODEL
              value: "gemma-3"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
