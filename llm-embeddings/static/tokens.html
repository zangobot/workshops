<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LLM Internals Viewer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand">LLM<span>Demos</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="tokens.html" class="active">Tokens & Internals</a>
      <a href="function.html">Function Calling</a>
      <a href="agent.html">Agent Loop</a>
    </div>
  </nav>
<div class="wrap">
  <h1 class="tokens-title">LLM Internals Viewer</h1>
  <div class="tokens-sub">Live tokenization · Embedding FFT heatmaps · Next-token logits — updates as you type</div>
  <div id="status" class="status off">Checking backend...</div>

  <div class="input-wrap">
    <div class="editor-container">
      <div class="editor-colors" id="editorColors"></div>
      <div class="editor" id="editor" contenteditable="true" data-placeholder="Start typing to see model internals..." spellcheck="false"></div>
    </div>
    <div class="spinner" id="spinner"></div>
    <div class="ghost" id="ghost"></div>
  </div>

  <div id="results">
    <div class="tokens-empty-state">
      <div class="arrow">⌨</div>
      Type something above — results appear live
    </div>
  </div>
</div>
<div class="heatmap-tooltip" id="tooltip"></div>

<script>
const COLORS = ["#6366f1","#f59e0b","#10b981","#ef4444","#8b5cf6","#ec4899","#14b8a6","#f97316","#3b82f6","#84cc16"];
const BG_ALPHA = "28";
const STATE = { result: null, selectedToken: 0, pending: null, inflight: false, lastText: "" };
const DEBOUNCE_MS = 250;
let debounceTimer = null;

const editorEl = document.getElementById("editor");
const colorsEl = document.getElementById("editorColors");
const tooltipEl = document.getElementById("tooltip");

const SCALES = {
  input_embed:   { from: [15, 23, 42], to: [99, 102, 241] },
  output_hidden: { from: [15, 23, 42], to: [245, 158, 11] },
  lm_head:       { from: [15, 23, 42], to: [236, 72, 153] },
};

function lerpColor(scale, t) {
  t = Math.max(0, Math.min(1, t));
  const r = Math.round(scale.from[0] + (scale.to[0] - scale.from[0]) * t);
  const g = Math.round(scale.from[1] + (scale.to[1] - scale.from[1]) * t);
  const b = Math.round(scale.from[2] + (scale.to[2] - scale.from[2]) * t);
  return `rgb(${r},${g},${b})`;
}

fetch("/api/health").then(r=>r.json()).then(h=>{
  const el = document.getElementById("status");
  el.className = "status ok";
  el.textContent = `● ${h.model_path} — ${h.device} — dim ${h.hidden_dim} — vocab ${h.vocab_size.toLocaleString()}`;
}).catch(()=>{ document.getElementById("status").textContent = "● Backend offline"; });

function getEditorText() { return editorEl.innerText.replace(/\n$/,""); }

// FIXED: Handles invisible <bos> tokens without throwing off the text alignment
function renderColoredTokens(text, tokens) {
  if (!tokens?.length || !text) { colorsEl.innerHTML = ""; return; }
  let html = "", pos = 0;
  
  tokens.forEach((t, i) => {
    const c = COLORS[i % COLORS.length];
    const idx = text.indexOf(t.text, pos);
    
    // Only render the highlight if the token text actually exists in the typed string
    if (idx >= 0) {
      if (idx > pos) html += escHtml(text.slice(pos, idx));
      html += `<span style="color:${c};background:${c}${BG_ALPHA}">${escHtml(t.text)}</span>`;
      pos = idx + t.text.length;
    }
  });
  
  if (pos < text.length) html += escHtml(text.slice(pos));
  colorsEl.innerHTML = html;
}

editorEl.addEventListener("input", function() {
  clearTimeout(debounceTimer);
  const text = getEditorText();
  if (!text) {
    STATE.result = null; colorsEl.innerHTML = "";
    document.getElementById("results").innerHTML = '<div class="empty-state"><div class="arrow">⌨</div>Type something above — results appear live</div>';
    document.getElementById("ghost").textContent = "";
    return;
  }
  debounceTimer = setTimeout(() => fireRequest(text), DEBOUNCE_MS);
});

editorEl.addEventListener("paste", function(e) {
  e.preventDefault();
  document.execCommand("insertText", false, (e.clipboardData || window.clipboardData).getData("text/plain"));
});

editorEl.addEventListener("keydown", function(e) {
  if (e.key === "Tab" && STATE.result?.logits?.length) {
    e.preventDefault();
    document.execCommand("insertText", false, STATE.result.logits[0].token);
  }
});

async function fireRequest(text) {
  if (text === STATE.lastText) return;
  if (STATE.inflight) { STATE.pending = text; return; }
  STATE.inflight = true; STATE.lastText = text;
  document.getElementById("spinner").classList.add("active");
  try {
    const r = await fetch("/api/analyze", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ text }) });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const cur = getEditorText();
    if (text === cur || !STATE.pending) {
      STATE.result = data;
      STATE.selectedToken = Math.max(0, data.tokens.length - 1);
      renderColoredTokens(text, data.tokens);
      render();
    }
  } catch(e) { console.error("analyze error:", e); }
  STATE.inflight = false;
  document.getElementById("spinner").classList.remove("active");
  if (STATE.pending) { const n = STATE.pending; STATE.pending = null; fireRequest(n); }
}

function selectToken(i) { STATE.selectedToken = i; render(); }

// FIXED: Dynamically infers nFreq and injects data-freq attribute
function buildHeatmap(label, scaleKey, fftObj, tokens, selectedToken) {
  const { values } = fftObj; // values[token_idx][freq_idx]
  const scale = SCALES[scaleKey];
  const nTok = tokens.length;
  const nFreq = values[0]?.length || 0;

  let gmax = 0;
  values.forEach(row => row.forEach(v => { if (v > gmax) gmax = v; }));
  if (gmax === 0) gmax = 1;

  let html = `<div class="heatmap-section"><div class="heatmap-label">${label}</div>`;
  html += `<table class="heatmap-table">`;

  // Header row: corner + token labels
  html += `<tr>`;
  tokens.forEach((t, ci) => {
    const c = COLORS[ci % COLORS.length];
    const sel = ci === selectedToken;
    const display = t.text.replace(/ /g,"·").replace(/\n/g,"↵");
    html += `<td class="ht-tok-label" style="color:${c};${sel ? 'font-weight:700;text-decoration:underline' : ''}" onclick="selectToken(${ci})">${escHtml(display)}</td>`;
  });
  html += `</tr>`;

  // Each row = one frequency bin
  for (let fi = 0; fi < nFreq; fi++) {
    html += `<tr>`;
    for (let ti = 0; ti < nTok; ti++) {
      const v = values[ti][fi];
      const t = v / gmax;
      const bg = lerpColor(scale, t);
      const sel = ti === selectedToken ? " ht-col-sel" : "";
      html += `<td class="ht-cell${sel}" style="background:${bg}" data-token="${escAttr(tokens[ti].text)}" data-freq="${fi}" data-val="${v.toFixed(4)}" data-scale="${scaleKey}"></td>`;
    }
    html += `</tr>`;
  }
  html += `</table>`;

  const gradStops = [0, 0.25, 0.5, 0.75, 1].map(t => lerpColor(scale, t)).join(",");
  html += `<div class="legend"><span class="legend-label">0</span><div class="legend-bar" style="background:linear-gradient(to right,${gradStops})"></div><span class="legend-label">${gmax.toFixed(2)}</span></div>`;
  html += `</div>`;
  return html;
}

function render() {
  const { result: R, selectedToken: si } = STATE;
  if (!R) return;
  const text = getEditorText();

  document.getElementById("ghost").textContent = R.logits.length > 0 ? "Tab → " + R.logits[0].token : "";

  let tokHtml = R.tokens.map((t,i) => {
    const c = COLORS[i % COLORS.length];
    const sel = i === si;
    const display = t.text.replace(/ /g,"·").replace(/\n/g,"↵");
    return `<span class="tok${sel?" sel":""}" onclick="selectToken(${i})" style="background:${sel?c:c+'25'};color:${sel?'#fff':c};${sel?'border-color:'+c:''}">${display}</span>`;
  }).join("");
  const cur = R.tokens[si];
  if (cur) tokHtml += `<div class="tok-info">ID: ${cur.id} — "${cur.text}"</div>`;

  // FIXED: Removed lm_head to prevent crash, since it isn't returning from backend yet
  const heatmaps = buildHeatmap("Input Embeddings (embed_tokens → FFT top 20)", "input_embed", R.fft.input_embed, R.tokens, si)
    + buildHeatmap("Output Hidden States (last layer → FFT top 20)", "output_hidden", R.fft.output_hidden, R.tokens, si);

  const lMax = R.logits[0]?.prob || 0.5;
  let logHtml = R.logits.map(d => {
    const w = (d.prob / lMax) * 100;
    const pStr = d.prob < 0.001 ? d.prob.toExponential(2) : d.prob.toFixed(4);
    return `<div class="bar-row"><div class="bar-label">${escHtml(d.token)}</div><div class="bar-track"><div class="bar-fill" style="width:${w}%;background:#10b981"></div></div><div class="bar-val">${pStr}</div><div class="bar-extra">(${d.logit})</div></div>`;
  }).join("");

  document.getElementById("results").innerHTML = `
    <div class="panel visible">
      <div class="panel-title">① Tokenization — ${R.tokens.length} tokens</div>
      <div class="tokens">${tokHtml}</div>
    </div>
    <div class="panel visible">
      <div class="panel-title">② Embedding FFT Heatmaps (20 × N)</div>
      <div class="heatmap-stack">${heatmaps}</div>
    </div>
    <div class="panel visible">
      <div class="panel-title">③ Next-Token Logits → softmax</div>
      <div style="font-size:10px;color:#64748b;margin-bottom:8px">P(next | "${escHtml(text)}") — top ${R.logits.length} · <span style="color:#6366f1">Tab</span> to accept</div>
      ${logHtml}
    </div>
    <div class="tokens-footer visible">
      <strong>Model:</strong> ${R.model_path} on ${R.device} · vocab ${R.vocab_size.toLocaleString()} · hidden dim ${R.hidden_dim} · Real forward pass
    </div>`;

  document.querySelectorAll(".ht-cell").forEach(cell => {
    cell.addEventListener("mouseenter", showTooltip);
    cell.addEventListener("mouseleave", hideTooltip);
  });
}

function showTooltip(e) {
  const c = e.target;
  const s = SCALES[c.dataset.scale];
  tooltipEl.innerHTML = `<span style="color:${s ? lerpColor(s,1) : '#fff'}">${escHtml(c.dataset.token)}</span> · freq ${c.dataset.freq} · mag ${c.dataset.val}`;
  tooltipEl.style.display = "block";
  tooltipEl.style.left = (e.clientX + 12) + "px";
  tooltipEl.style.top = (e.clientY - 30) + "px";
}
function hideTooltip() { tooltipEl.style.display = "none"; }

function escHtml(s) { const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
function escAttr(s) { return s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
</script>
</body>
</html>
