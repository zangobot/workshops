// ── Syntax highlighting ────────────────────────────────────────
function syntaxHighlight(obj) {
  let raw = JSON.stringify(obj, null, 2);
  raw = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  raw = raw.replace(/"([^"\\]*(\\.[^"\\]*)*)"(\s*:)?/g, (m, key, _2, colon) => {
    if (colon) return `<span class="key">"${key}"</span>:`;
    return `<span class="str">"${key}"</span>`;
  });
  raw = raw.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');
  raw = raw.replace(/\b(true|false)\b/g, '<span class="bool">$1</span>');
  raw = raw.replace(/\bnull\b/g, '<span class="null">null</span>');
  raw = raw.replace(/<span class="key">"(_comment|_result_comment)"<\/span>:\s*<span class="str">"([^"]*)"<\/span>,?/g,
    '<span class="comment">$2</span>');
  return raw;
}

function getDelay(){ return speedMap[+document.getElementById('speed').value]; }

function renderScenarios(){
  const list = document.getElementById('scenario-list');
  list.innerHTML = '';
  SCENARIOS.forEach(s => {
    const b = document.createElement('button');
    b.className = 'scenario-btn' + (currentScenario?.id===s.id?' active':'');
    b.innerHTML = `<div class="label">${s.label}</div><div class="desc">${s.desc}</div>`;
    b.onclick = () => selectScenario(s);
    list.appendChild(b);
  });
}

  renderLoopViz();
  document.getElementById('messages-area').innerHTML =
    `<div class="empty-state"><div><div class="big">▶</div>Ready. Hit <strong>Auto-Play</strong> or <strong>Next Step</strong>.</div></div>`;
  updateButtons();
}

function renderLoopViz(){
  const viz = document.getElementById('loop-viz');
  const track = document.getElementById('loop-track');
  if(!currentScenario){ viz.style.display='none'; return; }
  viz.style.display='block';
  const activeLoopIdx = currentStep > 0 ? currentScenario.steps[Math.min(currentStep, currentScenario.steps.length)-1].loopIdx : -1;
  track.innerHTML = currentScenario.iterations.map((it,i) => {
    let cls = 'loop-iter';
    if(i < activeLoopIdx) cls += ' done';
    else if(i === activeLoopIdx) cls += ' active';
    return `<div class="${cls}">
      <span class="iter-label">${it.label}</span>
      <span class="iter-action">${it.action}</span>
      <span class="iter-badge ${it.badgeClass}">${it.badge}</span>
    </div>`;
  }).join('');
}

function renderStepIndicator(){
  const bar = document.getElementById('step-indicator');
  if(!currentScenario){ bar.innerHTML=''; return; }
  let html = '';
  currentScenario.steps.forEach((s,i) => {
    if(s.separator){
      html += `<div class="step-pill separator">⟳ ${s.separator}</div>`;
    }
    let cls = 'step-pill';
    if(i < currentStep) cls += ' done';
    else if(i === currentStep && currentStep > 0) cls += ' active';
    html += `<div class="${cls}">${s.name.replace(/^Iter \d+ — /,'').replace(/^Init(ialization)? — /,'')}</div>`;
  });
  bar.innerHTML = html;
}

function renderStep(step){
  const area = document.getElementById('messages-area');
  if(currentStep === 1) area.innerHTML = '';

  const block = document.createElement('div');
  block.className = `msg-block ${step.type}`;

  const arrowMap = {'init':'🚀','to-llm':'📤','from-llm':'📥','tool-exec':'🔧','final':'✅','loop-marker':'🔄'};

  let bodyHtml;
  if(step.pseudocode){
    bodyHtml = `<div class="pseudocode">${step.pseudoHtml}</div>`;
  } else {
    bodyHtml = `<div class="json-block">${syntaxHighlight(step.json)}</div>`;
  }

  block.innerHTML = `
    <div class="msg-header">
      <span>${arrowMap[step.type]||'📋'}</span>
      ${step.name}
    </div>
    <div class="msg-body">${bodyHtml}</div>
    ${step.explanation ? `<div class="explanation">${step.explanation}</div>` : ''}
  `;
  area.appendChild(block);
  block.scrollIntoView({behavior:'smooth', block:'end'});
}

function advanceStep(){
  if(!currentScenario || currentStep >= currentScenario.steps.length) return false;
  if(currentStep === 0) document.getElementById('messages-area').innerHTML = '';
  renderStep(currentScenario.steps[currentStep]);
  currentStep++;
  renderStepIndicator();
  renderLoopViz();
  updateButtons();
  return currentStep < currentScenario.steps.length;
}

function updateButtons(){
  const hasMore = currentScenario && currentStep < (currentScenario?.steps.length||0);
  document.getElementById('btn-play').disabled = !hasMore || playing;
  document.getElementById('btn-step').disabled = !hasMore || playing;
}

function startPlay(){
  if(!currentScenario) return;
  playing = true;
  updateButtons();
  function tick(){
    if(!playing) return;
    const more = advanceStep();
    if(more) playTimer = setTimeout(tick, getDelay());
    else stopPlay();
  }
  tick();
}
function stopPlay(){ playing=false; clearTimeout(playTimer); updateButtons(); }
function reset(){ stopPlay(); if(currentScenario) selectScenario(currentScenario); }

document.getElementById('btn-play').onclick = startPlay;
document.getElementById('btn-step').onclick = () => advanceStep();
document.getElementById('btn-reset').onclick = reset;
document.getElementById('speed').oninput = e => {
  const labels = {1:'0.3×',2:'0.6×',3:'1×',4:'2×',5:'3×'};
  document.getElementById('speed-label').textContent = labels[e.target.value];
};
document.getElementById('speed-label').textContent = '1×';
renderScenarios();
</script>
</body>
</html>
